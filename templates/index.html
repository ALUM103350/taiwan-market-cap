<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>台灣上市公司市值追蹤</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
:root{
  --bg:#0b1746;--surface:#0f1e5a;--surface2:#162266;--surface3:#1d2a78;
  --text:#f5f5f5;--muted:#8899cc;
  --green:#00c805;--red:#ff5000;--accent:#00c805;--yellow:#f5a623;
  /* Override Bootstrap white variables */
  --bs-body-bg:#0b1746;--bs-body-color:#f5f5f5;
  --bs-table-bg:#0f1e5a;--bs-table-color:#f5f5f5;
  --bs-modal-bg:#0f1e5a;
  --bs-card-bg:#0f1e5a;
}
*{box-sizing:border-box}
/* Nuclear override — kill all white backgrounds from Bootstrap/DataTables */
html,body,
.modal-content,.modal-body,.modal-header,.modal-footer,
.dropdown-menu,.popover,.tooltip-inner,
.form-control,.form-select,
.card,.card-body,
[class*="bg-white"]{background-color:#0b1746!important}
body{background:#0b1746;color:var(--text);font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif;min-height:100vh}
.navbar{background:var(--surface)!important;border-bottom:1px solid #162266}
.navbar-brand{font-weight:700;font-size:1.1rem;color:var(--accent)!important;letter-spacing:-.02em}
.card{background:var(--surface);border:1px solid #162266;border-radius:16px}
.card-sm{padding:1.1rem 1.4rem}
.stat-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.stat-value{font-size:1.6rem;font-weight:700;line-height:1.2;margin-top:.25rem;color:var(--text)}
.up{color:var(--green)}.down{color:var(--red)}.flat{color:var(--muted)}
.badge-up{background:rgba(0,200,5,.12);color:var(--green);border-radius:6px;padding:2px 9px;font-size:.8rem;font-weight:600}
.badge-down{background:rgba(255,80,0,.12);color:var(--red);border-radius:6px;padding:2px 9px;font-size:.8rem;font-weight:600}
.badge-flat{background:rgba(136,136,136,.1);color:var(--muted);border-radius:6px;padding:2px 9px;font-size:.8rem}
table.dataTable thead th,
table.dataTable thead th.sorting,
table.dataTable thead th.sorting_asc,
table.dataTable thead th.sorting_desc{background:#1e1e1e!important;color:#888!important;font-size:.73rem;text-transform:uppercase;letter-spacing:.05em;border:none!important}
table.dataTable tbody tr,
table.dataTable tbody tr.odd,
table.dataTable tbody tr.even{background:#0f1e5a!important;border-bottom:1px solid #162266!important}
table.dataTable tbody tr:hover,
table.dataTable tbody tr.odd:hover,
table.dataTable tbody tr.even:hover{background:#162266!important}
table.dataTable tbody td,
table.dataTable tbody tr td{color:#f5f5f5!important;font-size:.87rem;border:none!important;padding:.7rem .85rem!important}
.dataTables_wrapper{background:#0f1e5a;color:#f5f5f5}
div.dataTables_wrapper div.dataTables_length label,
div.dataTables_wrapper div.dataTables_filter label,
div.dataTables_wrapper div.dataTables_info{color:#888!important}
.dataTables_wrapper .dataTables_filter input{background:var(--surface2);color:var(--text);border:1px solid #1d2a78;border-radius:8px;padding:.3rem .7rem}
.dataTables_wrapper .dataTables_length select{background:var(--surface2);color:var(--text);border:1px solid #1d2a78;border-radius:6px}
.dataTables_wrapper .dataTables_info,.dataTables_wrapper .dataTables_paginate{color:var(--muted);font-size:.82rem}
.page-link{background:var(--surface2)!important;border-color:#333!important;color:var(--text)!important}
.page-item.active .page-link{background:var(--accent)!important;border-color:var(--accent)!important;color:#000!important;font-weight:700}
.btn-refresh{background:var(--accent);border:none;color:#000;border-radius:8px;padding:.4rem 1rem;font-size:.85rem;cursor:pointer;font-weight:700}
.btn-refresh:hover{background:#00e006}
.btn-refresh:disabled{opacity:.5;cursor:wait}
.date-select{background:var(--surface2);color:var(--text);border:1px solid #1d2a78;border-radius:8px;padding:.35rem .7rem;font-size:.85rem}
.rank-badge{display:inline-block;width:2.2rem;text-align:center;background:var(--surface3);border-radius:5px;font-size:.78rem;color:var(--muted);font-weight:600}
.rank-badge.top3{background:rgba(0,200,5,.15);color:var(--green)}
.stock-link{color:var(--text);text-decoration:none;font-weight:600}
.stock-link:hover{color:var(--accent)}
.chart-box{background:var(--surface);border:1px solid #162266;border-radius:16px;padding:1.1rem}
.section-title{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem}
.loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(6px)}
.spinner{width:3rem;height:3rem;border:3px solid #222;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-content{background:var(--surface);border:1px solid #162266;color:var(--text)}
.modal-header{border-bottom:1px solid #162266}
.modal-footer{border-top:1px solid #222}
#stockChart canvas{max-height:220px}
.alert-info-dark{background:rgba(0,200,5,.08);border:1px solid rgba(0,200,5,.2);color:var(--green);border-radius:8px;padding:.6rem 1rem;font-size:.83rem}
.alert-tab{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--muted);border-radius:6px;padding:2px 10px;font-size:.74rem;cursor:pointer;transition:all .15s}
.alert-tab:hover{background:rgba(255,255,255,.1);color:var(--text)}
.alert-tab.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
.cmp-metric{background:#162266;border:1px solid #1d2a78;color:var(--muted);border-radius:7px;padding:4px 14px;font-size:.8rem;cursor:pointer;transition:all .15s}
.cmp-metric:hover{background:#1d2a78;color:var(--text)}
.cmp-metric.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
#cmpDropdown .cmp-item{padding:.55rem 1rem;cursor:pointer;font-size:.84rem;border-bottom:1px solid #1d2a78;display:flex;gap:.75rem;align-items:center}
#cmpDropdown .cmp-item:last-child{border-bottom:none}
#cmpDropdown .cmp-item:hover{background:#1d2a78}
#cmpDropdown .cmp-item .cmp-code{color:var(--accent);font-weight:700;min-width:3rem}
#cmpDropdown .cmp-item .cmp-name{color:var(--text)}
#cmpDropdown .cmp-item .cmp-cap{color:var(--muted);font-size:.76rem;margin-left:auto}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid px-4">
    <span class="navbar-brand">
      <i class="fa-solid fa-chart-line me-2" style="color:var(--blue)"></i>
      台灣上市公司市值追蹤
    </span>
    <div class="d-flex align-items-center gap-3 ms-auto">
      <select id="dateSelect" class="date-select" title="選擇日期"></select>
      <button id="refreshBtn" class="btn-refresh" onclick="refreshData()">
        <i class="fa-solid fa-rotate-right me-1"></i>更新資料
      </button>
    </div>
  </div>
</nav>

<!-- Loading overlay -->
<div id="loadingOverlay" class="loading-overlay">
  <div class="text-center">
    <div class="spinner mx-auto mb-3"></div>
    <div style="color:var(--muted);font-size:.9rem" id="loadingMsg">載入中…</div>
  </div>
</div>

<!-- Alert banner -->
<div id="alertBanner" style="display:none;background:linear-gradient(90deg,#0b1746,#162266);border-bottom:2px solid var(--accent);padding:.6rem 1.5rem">
  <!-- Period tabs + navigation -->
  <div style="display:flex;gap:.4rem;margin-bottom:.5rem;align-items:center;flex-wrap:wrap">
    <span style="color:var(--accent);font-size:.75rem;font-weight:700;margin-right:.3rem;white-space:nowrap;cursor:pointer"
      onclick="toggleAlertBody()">
      <i class="fa-solid fa-bell me-1"></i>異動統計
      <i id="alertCollapseIcon" class="fa-solid fa-chevron-up ms-1" style="font-size:.65rem;color:var(--muted)"></i>
    </span>
    <button class="alert-tab active" data-p="day"   onclick="setAlertPeriod(this)">當日</button>
    <button class="alert-tab"        data-p="week"  onclick="setAlertPeriod(this)">每週</button>
    <button class="alert-tab"        data-p="month" onclick="setAlertPeriod(this)">每月</button>
    <!-- Week / month navigator (hidden when period=day) -->
    <div id="alertNav" style="display:none;align-items:center;gap:.3rem;margin-left:.5rem">
      <button onclick="navPeriod(-1)" style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
        color:var(--text);border-radius:6px;padding:1px 9px;cursor:pointer;font-size:.82rem">‹</button>
      <span id="alertPeriodLabel" style="color:var(--text);font-size:.75rem;white-space:nowrap;min-width:130px;text-align:center"></span>
      <button onclick="navPeriod(1)" style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
        color:var(--text);border-radius:6px;padding:1px 9px;cursor:pointer;font-size:.82rem">›</button>
    </div>
  </div>
  <div id="alertBody" style="overflow:hidden;transition:max-height .25s ease">
    <div id="alertContent"></div>
  </div>
</div>

<!-- Main -->
<div class="container-fluid px-4 py-4">

  <!-- Free comparison -->
  <div class="card p-3 mb-4">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
      <div class="section-title mb-0"><i class="fa-solid fa-chart-line me-1" style="color:var(--accent)"></i>自由比較</div>
      <div class="d-flex gap-1">
        <button class="cmp-metric active" data-m="market_cap" onclick="setMetric(this)">市值</button>
        <button class="cmp-metric" data-m="close_price" onclick="setMetric(this)">股價</button>
        <button class="cmp-metric" data-m="pct" onclick="setMetric(this)">漲跌幅%</button>
      </div>
    </div>
    <div style="position:relative;margin-bottom:.75rem">
      <div class="d-flex gap-2 align-items-center flex-wrap">
        <div style="position:relative;flex:1;min-width:220px">
          <input id="compareInput" type="text" placeholder="搜尋代號或公司名稱…" autocomplete="off"
            class="date-select" style="width:100%;padding-right:2rem"
            oninput="onCmpInput()" onkeydown="onCmpKey(event)">
          <i class="fa-solid fa-magnifying-glass" style="position:absolute;right:.7rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.8rem;pointer-events:none"></i>
          <div id="cmpDropdown" style="display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;
            background:#162266;border:1px solid #1d2a78;border-radius:10px;z-index:999;
            max-height:220px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.5)"></div>
        </div>
        <select id="compareDays" class="date-select" onchange="refreshCompare()" style="width:90px">
          <option value="10">10天</option>
          <option value="30" selected>30天</option>
          <option value="60">60天</option>
        </select>
        <button class="btn-refresh" onclick="clearCompare()" style="background:#1d2a78;color:var(--muted);font-size:.8rem;padding:.38rem .8rem">
          <i class="fa-solid fa-trash-can me-1"></i>清除
        </button>
      </div>
      <div id="compareTags" class="d-flex flex-wrap gap-1 mt-2"></div>
    </div>
    <div style="position:relative;height:320px">
      <canvas id="compareChart"></canvas>
      <div id="compareEmpty" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:.5rem">
        <i class="fa-solid fa-chart-line" style="font-size:2rem;opacity:.3"></i>
        <span style="font-size:.88rem">搜尋並加入股票開始比較（最多 8 支）</span>
      </div>
    </div>
  </div>

  <!-- MA Growth Screener -->
  <div class="card p-3 mb-4">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
      <div class="section-title mb-0">
        <i class="fa-solid fa-filter me-1" style="color:var(--accent)"></i>市值多頭排列
        <span style="color:var(--muted);font-size:.72rem;font-weight:400;margin-left:.5rem">每3營業日為1期 · 3MA &gt; 10MA &gt; 30MA &gt; 60MA</span>
      </div>
      <button id="maScreenerBtn" class="btn-refresh" onclick="loadScreener()">
        <i class="fa-solid fa-magnifying-glass-chart me-1"></i>載入
      </button>
    </div>

    <!-- Period navigation -->
    <div id="maNavRow" style="display:none;align-items:center;gap:.5rem;margin-bottom:.75rem;flex-wrap:wrap" class="d-flex">
      <button onclick="navScreener(-1)" style="background:#162266;border:1px solid #1d2a78;color:var(--text);border-radius:7px;padding:3px 12px;cursor:pointer;font-size:.85rem">‹</button>
      <div style="text-align:center;min-width:200px">
        <div id="maPeriodLabel" style="color:var(--text);font-size:.82rem;font-weight:600"></div>
        <div id="maPeriodDates" style="color:var(--muted);font-size:.72rem"></div>
      </div>
      <button onclick="navScreener(1)" style="background:#162266;border:1px solid #1d2a78;color:var(--text);border-radius:7px;padding:3px 12px;cursor:pointer;font-size:.85rem">›</button>
      <span id="maPeriodCount" style="color:var(--muted);font-size:.75rem;margin-left:.3rem"></span>
    </div>

    <div id="maScreenerResult" style="display:none">
      <div id="maScreenerBody"></div>
    </div>
    <div id="maScreenerEmpty" style="color:var(--muted);font-size:.85rem;text-align:center;padding:1rem 0;display:none">
      此期間無符合多頭排列的股票
    </div>
  </div>

  <!-- Summary cards -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="card card-sm">
        <div class="stat-label">總市值</div>
        <div class="stat-value" id="totalCap">—</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card card-sm">
        <div class="stat-label">上漲家數</div>
        <div class="stat-value up" id="upCount">—</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card card-sm">
        <div class="stat-label">下跌家數</div>
        <div class="stat-value down" id="downCount">—</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card card-sm">
        <div class="stat-label">上市家數</div>
        <div class="stat-value" id="totalCount">—</div>
      </div>
    </div>
  </div>


  <!-- Trillion crossover history -->
  <div id="alertHistoryCard" class="card p-3 mb-4" style="display:none">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <div class="section-title mb-0">
        <i class="fa-solid fa-bell me-1" style="color:var(--accent)"></i>兆級排名交叉紀錄
      </div>
      <span id="alertHistoryCount" style="font-size:.78rem;color:var(--muted)"></span>
    </div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:.84rem">
        <thead>
          <tr style="color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.05em">
            <th style="padding:.5rem .75rem;white-space:nowrap">日期</th>
            <th style="padding:.5rem .75rem">級距</th>
            <th style="padding:.5rem .75rem">超越方</th>
            <th style="padding:.5rem .75rem;text-align:center;color:var(--muted)"></th>
            <th style="padding:.5rem .75rem">被超越方</th>
            <th style="padding:.5rem .75rem;text-align:right;white-space:nowrap">市值差距</th>
          </tr>
        </thead>
        <tbody id="alertHistoryBody"></tbody>
      </table>
    </div>
  </div>

  <!-- No market cap warning -->
  <div id="noCapWarning" class="alert-info-dark mb-3 d-none">
    <i class="fa-solid fa-circle-info me-2"></i>
    目前顯示的是從 TWSE 備援資料，市值欄位需要 FinMind API 才能計算。
    可設定 <code>FINMIND_TOKEN</code> 後點擊「更新資料」。
  </div>

  <!-- Data table -->
  <div class="card p-3">
    <div class="section-title mb-2"><i class="fa-solid fa-table me-1"></i>完整排行榜</div>
    <table id="mainTable" class="table table-sm" style="width:100%">
      <thead>
        <tr>
          <th>排名</th>
          <th>代號</th>
          <th>公司名稱</th>
          <th>收盤價</th>
          <th>市值 (億)</th>
          <th>市值變化 (億)</th>
          <th>漲跌幅</th>
          <th>股價漲跌</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- Stock history modal -->
<div class="modal fade" id="stockModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="stockModalTitle">市值走勢</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="stockChart"><canvas id="historyCanvas"></canvas></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">關閉</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
// ── Helpers ──────────────────────────────────────────────────────────────────
const UNITS = 1e8;  // 億

function fmtCap(v) {
  if (!v || v === 0) return '—';
  const yi = v / UNITS;
  if (yi >= 10000) return (yi / 10000).toFixed(2) + ' 兆';
  if (yi >= 1) return yi.toFixed(2) + ' 億';
  return (v / 1e4).toFixed(0) + ' 萬';
}

function fmtCapChange(v) {
  if (v === 0 || v === null || v === undefined) return '<span class="flat">—</span>';
  const yi = v / UNITS;
  const sign = v > 0 ? '+' : '';
  const cls = v > 0 ? 'up' : 'down';
  return `<span class="${cls}">${sign}${yi.toFixed(2)} 億</span>`;
}

function fmtPct(v) {
  v = parseFloat(v);
  if (!v || isNaN(v)) return '<span class="badge-flat">0.00%</span>';
  const sign = v > 0 ? '+' : '';
  const cls = v > 0 ? 'badge-up' : 'badge-down';
  return `<span class="${cls}">${sign}${v.toFixed(2)}%</span>`;
}

function fmtPrice(v) {
  if (!v) return '—';
  return v.toLocaleString('zh-TW', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function fmtPriceChange(v) {
  if (!v) return '<span class="flat">—</span>';
  const sign = v > 0 ? '+' : '';
  const cls = v > 0 ? 'up' : v < 0 ? 'down' : 'flat';
  return `<span class="${cls}">${sign}${v.toFixed(2)}</span>`;
}

function rankBadge(r) {
  const top = r <= 3 ? ' top3' : '';
  return `<span class="rank-badge${top}">${r || '—'}</span>`;
}

// ── State ─────────────────────────────────────────────────────────────────────
let table = null;
let gainChart = null, loseChart = null, histChart = null;
let currentData = [];

// ── Chart defaults ─────────────────────────────────────────────────────────
Chart.defaults.color = '#888';
Chart.defaults.borderColor = '#162266';
Chart.defaults.font.family = "-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif";

// ── Init DataTable ──────────────────────────────────────────────────────────
function initTable() {
  table = $('#mainTable').DataTable({
    data: [],
    columns: [
      { data: 'market_cap_rank' },
      { data: 'stock_id' },
      { data: 'stock_name' },
      { data: 'close_price' },
      { data: 'market_cap' },
      { data: 'cap_change' },
      { data: 'cap_change_pct' },
      { data: 'price_change' },
    ],
    columnDefs: [
      { targets: 0, render: d => rankBadge(d), className: 'text-center' },
      { targets: 1, render: (d, _, row) =>
        `<a href="#" class="stock-link" onclick="showHistory('${d}','${row.stock_name}');return false">${d}</a>` },
      { targets: 3, render: d => fmtPrice(d) },
      { targets: 4, render: d => fmtCap(d) },
      { targets: 5, render: d => fmtCapChange(d) },
      { targets: 6, render: d => fmtPct(d) },
      { targets: 7, render: d => fmtPriceChange(d) },
    ],
    order: [[4, 'desc']],
    pageLength: 50,
    lengthMenu: [25, 50, 100, 200],
    language: {
      search: '搜尋：', lengthMenu: '顯示 _MENU_ 筆',
      info: '第 _START_–_END_ 筆，共 _TOTAL_ 筆',
      paginate: { previous: '‹', next: '›' },
      zeroRecords: '無資料', infoEmpty: '無資料',
    },
    dom: "<'row mb-2'<'col-sm-6'l><'col-sm-6'f>>rt<'row mt-2'<'col-sm-5'i><'col-sm-7'p>>",
  });
}

// ── Load dates ───────────────────────────────────────────────────────────────
async function loadDates() {
  const res = await fetch('/api/dates');
  const dates = await res.json();
  const sel = document.getElementById('dateSelect');

// ── Load market cap data ──────────────────────────────────────────────────────
async function loadData(dateStr) {
  showLoading(`載入 ${dateStr} 資料…`);
  try {
    const res = await fetch(`/api/market-cap?date=${dateStr}`);
    const json = await res.json();
    if (json.error) { alert(json.error); hideLoading(); return; }

    currentData = json.data;

    // Summary
    const s = json.summary;
    document.getElementById('totalCap').textContent = fmtCap(s.total_market_cap);
    document.getElementById('upCount').textContent = s.up_count ?? '—';
    document.getElementById('downCount').textContent = s.down_count ?? '—';
    document.getElementById('totalCount').textContent = s.total ?? '—';

    // Check if market cap data exists
    const hasMarketCap = currentData.some(r => r.market_cap > 0);
    document.getElementById('noCapWarning').classList.toggle('d-none', hasMarketCap);

    // Table
    if (table) {
      table.clear().rows.add(currentData).draw();
    }

    // Charts
    renderTopCharts(currentData);
  } catch (e) {
    console.error(e);
  } finally {
    hideLoading();
  }
}

// ── Bar charts ────────────────────────────────────────────────────────────────
function renderTopCharts(data) {
  const sorted = [...data].filter(r => r.market_cap > 0 && r.cap_change !== undefined);

  const gainers = [...sorted].sort((a,b) => b.cap_change_pct - a.cap_change_pct).slice(0, 10);
  const losers  = [...sorted].sort((a,b) => a.cap_change_pct - b.cap_change_pct).slice(0, 10);

  renderBar('gainersChart', gainers, '#00c805', gainChart, c => gainChart = c);
  renderBar('losersChart',  losers,  '#ff5000', loseChart, c => loseChart = c);
}

function renderBar(canvasId, data, color, existing, setter) {
  if (existing) existing.destroy();
  const ctx = document.getElementById(canvasId).getContext('2d');
  setter(new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(r => `${r.stock_id} ${r.stock_name}`),
      datasets: [{
        data: data.map(r => parseFloat(r.cap_change_pct) || 0),
        backgroundColor: color + '99',
        borderColor: color,
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: { legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.x.toFixed(2)}%` } }
      },
      scales: {
        x: { grid: { color: '#334155' }, ticks: { callback: v => v+'%' } },
        y: { grid: { display: false }, ticks: { font: { size: 11 } } },
      }
    }
  }));
}

const COMPARE_COLORS = ['#00c805','#ff5000','#3b82f6','#f59e0b','#a855f7','#ec4899','#14b8a6','#f97316'];
let compareStocks = [];
let compareChart  = null;
let cmpMetric     = 'market_cap';
let cmpDropSel    = -1;

// ─ Autocomplete ───────────────────────────────────────────────────────────────
function onCmpInput() {
  const q = document.getElementById('compareInput').value.trim().toLowerCase();
  const dd = document.getElementById('cmpDropdown');
  cmpDropSel = -1;
  if (!q || !currentData.length) { dd.style.display='none'; return; }

  const hits = currentData
    .filter(r => r.stock_id.startsWith(q) || r.stock_name.toLowerCase().includes(q))
    .slice(0, 8);

  if (!hits.length) { dd.style.display='none'; return; }

  dd.innerHTML = hits.map((r,i) => {
    const cap = r.market_cap ? (r.market_cap/1e8).toFixed(0)+' 億' : '';
    return `<div class="cmp-item" data-id="${r.stock_id}" data-name="${r.stock_name}"
      onmousedown="pickCmpItem('${r.stock_id}','${r.stock_name.replace(/'/g,'')}')">
      <span class="cmp-code">${r.stock_id}</span>
      <span class="cmp-name">${r.stock_name}</span>
      <span class="cmp-cap">${cap}</span>
    </div>`;
  }).join('');
  dd.style.display = 'block';
}

function onCmpKey(e) {
  const dd = document.getElementById('cmpDropdown');
  const items = dd.querySelectorAll('.cmp-item');
  if (e.key === 'ArrowDown') { cmpDropSel = Math.min(cmpDropSel+1, items.length-1); highlightDrop(items); e.preventDefault(); }
  else if (e.key === 'ArrowUp') { cmpDropSel = Math.max(cmpDropSel-1, 0); highlightDrop(items); e.preventDefault(); }
  else if (e.key === 'Enter') {
    if (cmpDropSel >= 0 && items[cmpDropSel]) {
      const el = items[cmpDropSel];
      pickCmpItem(el.dataset.id, el.dataset.name);
    } else { addCompareById(document.getElementById('compareInput').value.trim()); }
    e.preventDefault();
  } else if (e.key === 'Escape') { dd.style.display='none'; }
}

function highlightDrop(items) {
  items.forEach((el,i) => el.style.background = i===cmpDropSel ? '#1d2a78' : '');
}

function pickCmpItem(id, name) {
  document.getElementById('compareInput').value = '';
  document.getElementById('cmpDropdown').style.display = 'none';
  addCompareById(id, name);
}

document.addEventListener('click', e => {
  if (!e.target.closest('#compareInput') && !e.target.closest('#cmpDropdown'))
    document.getElementById('cmpDropdown').style.display = 'none';
});

// ─ Add / remove ───────────────────────────────────────────────────────────────
async function addCompareById(id, name) {
  if (!id) return;
  if (compareStocks.find(s => s.id === id)) return;
  if (compareStocks.length >= 8) { alert('最多比較 8 支股票'); return; }

  if (!name) {
    const found = currentData.find(r => r.stock_id === id);
    name = found ? found.stock_name : id;
  }
  compareStocks.push({ id, name });
  renderCompareTags();
  await refreshCompare();
}

  document.getElementById('cmpDropdown').style.display = 'none';

function removeCompare(id) {
  compareStocks = compareStocks.filter(s => s.id !== id);

  refreshCompare();
}

// ─ Chart render ───────────────────────────────────────────────────────────────
async function refreshCompare() {
  const empty = document.getElementById('compareEmpty');
  if (!compareStocks.length) {
    if (compareChart) { compareChart.destroy(); compareChart = null; }
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  const days = document.getElementById('compareDays').value;
  const allData = await Promise.all(
    compareStocks.map(s =>
      fetch(`/api/stock/${s.id}/history?days=${days}`)
        .then(r => r.json()).then(h => ({ ...s, history: h }))
    )
  );

  const dateSet = new Set();
  allData.forEach(s => s.history.forEach(r => dateSet.add(r.date)));
  const labels = [...dateSet].sort();

  // Build first-day baseline for pct mode
  const datasets = allData.map((s, i) => {
    const byDate = Object.fromEntries(s.history.map(r => [r.date, r]));
    const firstRow = s.history[0];

    let getValue, yLabel, fmt;
    if (cmpMetric === 'market_cap') {
      getValue = r => r ? +(r.market_cap/1e8).toFixed(1) : null;
      yLabel = '億'; fmt = v => v + ' 億';
    } else if (cmpMetric === 'close_price') {
      getValue = r => r ? r.close_price : null;
      yLabel = '元'; fmt = v => v + ' 元';
    } else {
      // pct change relative to first day
      const base = firstRow ? firstRow.close_price : null;
      getValue = r => (r && base) ? +((r.close_price - base)/base*100).toFixed(2) : null;
      yLabel = '%'; fmt = v => v + '%';
    }

    return {
      label: `${s.id} ${s.name}`,
      data: labels.map(d => getValue(byDate[d])),
      borderColor: COMPARE_COLORS[i],
      backgroundColor: COMPARE_COLORS[i] + '12',
      fill: cmpMetric === 'pct',
      tension: .35,
      pointRadius: 2,
      pointHoverRadius: 5,
      spanGaps: true,
      _fmt: fmt,
    };
  });

  const fmt = datasets[0]?._fmt || (v => v);

  if (compareChart) compareChart.destroy();
  const ctx = document.getElementById('compareChart').getContext('2d');
  compareChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          labels: { color: '#f5f5f5', boxWidth: 10, padding: 16, font: { size: 12 } }
        },
        tooltip: {
          callbacks: {
            label: c => ` ${c.dataset.label}: ${datasets[c.datasetIndex]._fmt(c.parsed.y)}`
          }
        }
      },
      scales: {
        x: { grid: { color:'#162266' }, ticks: { color:'#8899cc', maxTicksLimit:10 } },
        y: { grid: { color:'#162266' }, ticks: { color:'#8899cc', callback: v => fmt(v) } }
      }
    }
  });
}

// ── MA Growth Screener ────────────────────────────────────────────────────────
const MA_TIERS     = ['兆','五千億','千億','五百億'];
const MA_TIER_CLR  = t => t==='兆'?'#a78bfa':t==='五千億'?'#38bdf8':t==='千億'?'#fb923c':'#f43f5e';
const MA_COLS = [
  ['ma3',  '3MA',  '#00c805'],['ma10','10MA','#4ade80'],
  ['ma20', '20MA', '#86efac'],['ma30','30MA','#a3e635'],
  ['ma40', '40MA', '#bef264'],['ma50','50MA','#d9f99d'],
  ['ma60', '60MA', '#94a3b8'],['ma120','120MA','#64748b'],
];

let _screenerPeriods = [];
let _screenerIdx     = -1;

async function loadScreener(targetPeriod) {
  const btn = document.getElementById('maScreenerBtn');
  const res = document.getElementById('maScreenerResult');
  const emp = document.getElementById('maScreenerEmpty');
  const nav = document.getElementById('maNavRow');

  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-1"></i>計算中…';
  res.style.display = 'none'; emp.style.display = 'none';

  try {
    // Load available periods if not yet loaded
    if (!_screenerPeriods.length) {
      const pr = await fetch('/api/screener/ma/periods');
      _screenerPeriods = await pr.json();  // desc order
    }
    if (!_screenerPeriods.length) { emp.style.display='block'; btn.disabled=false; return; }

    const period = targetPeriod || _screenerPeriods[0];
    const r = await fetch(`/api/screener/ma?period=${period}`);
    const json = await r.json();

    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-magnifying-glass-chart me-1"></i>重新載入';

    _screenerIdx = json.period_index;
    // Update nav
    nav.style.display = 'flex';
    document.getElementById('maPeriodLabel').textContent = `第 ${json.period_index+1} 期 / 共 ${json.total_periods} 期`;
    document.getElementById('maPeriodDates').textContent = json.period_dates ? json.period_dates.join(' · ') : json.period_end;
    document.getElementById('maPeriodCount').textContent = `符合 ${json.data.length} 檔`;

    renderScreenerTable(json.data, emp, res);
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-magnifying-glass-chart me-1"></i>載入';
    console.error(e);
  }
}

async function navScreener(delta) {
  if (!_screenerPeriods.length) return;
  // periods are in desc order; idx 0 = latest
  // period_index is ascending; convert
  const totalPeriods = _screenerPeriods.length;
  const descIdx = totalPeriods - 1 - _screenerIdx;  // current in desc list
  const newDescIdx = Math.max(0, Math.min(totalPeriods-1, descIdx - delta));
  await loadScreener(_screenerPeriods[newDescIdx]);
}

        <td style="padding:.48rem .5rem">

              const h = s[m] ? Math.max(2,Math.min(20,Math.round(s[m]/base(s)*14))) : 2;

                <th style="padding:.38rem .5rem">#</th><th style="padding:.38rem .5rem">代號</th>

                ${MA_COLS.map(([,l,c])=>`<th style="padding:.38rem .44rem;color:${c}">${l}</th>`).join('')}

// ── Period helpers ────────────────────────────────────────────────────────────
let _alertPeriod  = 'day';
let _alertDate    = '';
let _periodNavDate = '';   // independent nav reference for week/month

function getMonday(dateStr) {
  const d = new Date(dateStr);
  const day = d.getDay() || 7;
  d.setDate(d.getDate() - day + 1);
  return d.toISOString().split('T')[0];
}

function shiftDate(dateStr, period, delta) {
  const d = new Date(dateStr);
  if (period === 'week')  d.setDate(d.getDate() + delta * 7);
  if (period === 'month') d.setMonth(d.getMonth() + delta);
  return d.toISOString().split('T')[0];
}

function filterByPeriod(alerts, refDate, period) {
  if (period === 'day')   return alerts.filter(a => a.date === refDate);
  if (period === 'week')  return alerts.filter(a => getMonday(a.date) === getMonday(refDate));
  if (period === 'month') return alerts.filter(a => a.date.substring(0,7) === refDate.substring(0,7));
  return [];
}

function periodLabel(refDate, period) {
  if (period === 'day')   return refDate;
  if (period === 'week') {
    const mon = getMonday(refDate);
    const sun = new Date(mon); sun.setDate(sun.getDate() + 6);
    return `${mon} ～ ${sun.toISOString().split('T')[0]}`;
  }
  if (period === 'month') {
    const [y, m] = refDate.split('-');
    return `${y} 年 ${m} 月`;
  }
  return '';
}

function setAlertPeriod(btn) {
  document.querySelectorAll('.alert-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _alertPeriod = btn.dataset.p;
  // Reset nav to current selected date
  _periodNavDate = _alertDate;
  const nav = document.getElementById('alertNav');
  nav.style.display = _alertPeriod === 'day' ? 'none' : 'flex';
  renderAlertBanner(_alertDate);
}

function navPeriod(delta) {
  _periodNavDate = shiftDate(_periodNavDate, _alertPeriod, delta);
  renderAlertBannerWithNav();
}

function renderAlertBannerWithNav() {
  // Render using _periodNavDate as reference for week/month
  const refDate = _alertPeriod === 'day' ? _alertDate : _periodNavDate;
  _renderBannerContent(refDate);
}

function renderAlertBanner(selectedDate) {
  _alertDate     = selectedDate;
  _periodNavDate = selectedDate;
  const nav = document.getElementById('alertNav');
  nav.style.display = _alertPeriod === 'day' ? 'none' : 'flex';

function _renderBannerContent(refDate) {
  const banner  = document.getElementById('alertBanner');
  const content = document.getElementById('alertContent');
  const label   = document.getElementById('alertPeriodLabel');

  const periodAlerts = filterByPeriod(_allAlerts, refDate, _alertPeriod);
  label.textContent  = periodLabel(refDate, _alertPeriod);

  if (!periodAlerts.length) {
    content.innerHTML = `<span style="color:var(--muted);font-size:.8rem">此期間無超越事件</span>`;
    banner.style.display = 'block';
    return;
  }

  // ── Tier helper ──
  const TIERS = ['兆','五千億','千億','五百億'];
  const tierColor = t => t==='兆'?'#a78bfa':t==='五千億'?'#38bdf8':t==='千億'?'#fb923c':'#f43f5e';

  // ── Group alerts by tier ──
  const byTier = {};
  TIERS.forEach(t => { byTier[t] = []; });
  periodAlerts.forEach(a => {
    if (byTier[a.tier]) byTier[a.tier].push(a);
  });
  const activeTiers = TIERS.filter(t => byTier[t].length > 0);

  // ── Build tier sections ──
  const tiersHtml = activeTiers.map(tier => {
    const alerts = byTier[tier];
    const tc = tierColor(tier);

    // Winner count for this tier
    const winCount = {};
    alerts.forEach(a => {
      const key = `${a.winner_id}|${a.winner_name}`;
      winCount[key] = (winCount[key] || 0) + 1;
    });
    const topWinners = Object.entries(winCount).sort((a,b) => b[1]-a[1]);

    const winnersHtml = topWinners.map(([key, n]) => {
      const [id, name] = key.split('|');
      return `<span style="background:${tc}12;border:1px solid ${tc}33;
        border-radius:20px;padding:2px 9px;font-size:.77rem;white-space:nowrap;display:inline-flex;align-items:center;gap:4px">
        <span style="color:${tc};font-weight:700">${id} ${name}</span>
        <span style="background:${tc};color:#000;border-radius:10px;padding:0 6px;font-size:.7rem;font-weight:800">${n}次</span>
      </span>`;
    }).join('');

    // Detail rows for day view or short week lists
    let detailHtml = '';
    if (_alertPeriod === 'day' || alerts.length <= 8) {
      detailHtml = `<div style="display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.3rem">` +
        alerts.map(a => {
          const wCap = parseInt((a.winner_cap/1e8).toFixed(0)).toLocaleString();
          const lCap = parseInt((a.loser_cap/1e8).toFixed(0)).toLocaleString();
          return `<span style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
            border-radius:7px;padding:2px 8px;font-size:.75rem;white-space:nowrap">
            <span style="color:var(--green);font-weight:600">${a.winner_id} ${a.winner_name}</span>
            <span style="color:var(--muted);margin:0 3px;font-size:.72rem">超越</span>
            <span style="color:var(--red)">${a.loser_id} ${a.loser_name}</span>
            <span style="color:var(--muted);font-size:.68rem;margin-left:3px">${wCap} vs ${lCap} 億</span>
          </span>`;
        }).join('') + `</div>`;
    }

    return `<div style="margin-bottom:.5rem">
      <div style="display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;margin-bottom:.25rem">
        <span style="background:${tc}22;color:${tc};border-radius:5px;padding:1px 8px;font-size:.72rem;font-weight:700;white-space:nowrap">${tier}</span>
        ${winnersHtml}
        <span style="color:var(--muted);font-size:.7rem">共${alerts.length}次</span>
      </div>
      ${detailHtml}
    </div>`;
  }).join('<div style="border-top:1px solid #162266;margin:.4rem 0"></div>');

  content.innerHTML = tiersHtml;
  banner.style.display = 'block';
}

function renderAlertHistory(selectedDate) {
  const card  = document.getElementById('alertHistoryCard');
  const body  = document.getElementById('alertHistoryBody');
  const count = document.getElementById('alertHistoryCount');
  count.textContent = `共 ${_allAlerts.length} 筆`;

  body.innerHTML = _allAlerts.map((a, idx) => {
    const wCap      = (a.winner_cap / 1e8).toFixed(0);
    const lCap      = (a.loser_cap  / 1e8).toFixed(0);
    const diff      = ((a.winner_cap - a.loser_cap) / 1e8).toFixed(0);
    const isSelected = a.date === selectedDate;
    const bg        = isSelected ? 'background:#1a2e6e' : idx % 2 === 0 ? 'background:#0f1e5a' : 'background:#0b1746';
    const tierColor = a.tier === '兆' ? '#a78bfa' : a.tier === '五千億' ? '#38bdf8' : a.tier === '千億' ? '#fb923c' : '#f43f5e';
    return `
      <tr style="${bg};border-bottom:1px solid #162266${isSelected ? ';outline:1px solid #1d2a78' : ''}">
        <td style="padding:.55rem .75rem;white-space:nowrap;color:var(--muted);font-size:.78rem">
          ${isSelected ? '<span style="background:rgba(0,200,5,.15);color:var(--green);border-radius:4px;padding:1px 6px;font-size:.7rem;margin-right:4px">●</span>' : ''}
          ${a.date}
        </td>
        <td style="padding:.55rem .5rem;white-space:nowrap">
          <span style="background:${tierColor}22;color:${tierColor};border-radius:4px;padding:1px 6px;font-size:.7rem">${a.tier}</span>
        </td>
        <td style="padding:.55rem .75rem">
          <span style="color:var(--green);font-weight:600">${a.winner_id}</span>
          <span style="color:#8899cc;margin-left:4px;font-size:.82rem">${a.winner_name}</span>
          <span style="color:var(--muted);font-size:.75rem;margin-left:6px">${parseInt(wCap).toLocaleString()} 億</span>
        </td>
        <td style="padding:.55rem .5rem;text-align:center;color:var(--accent);font-size:.8rem">超越</td>
        <td style="padding:.55rem .75rem">
          <span style="color:var(--red)">${a.loser_id}</span>
          <span style="color:#8899cc;margin-left:4px;font-size:.82rem">${a.loser_name}</span>
          <span style="color:var(--muted);font-size:.75rem;margin-left:6px">${parseInt(lCap).toLocaleString()} 億</span>
        </td>
        <td style="padding:.55rem .75rem;text-align:right;color:var(--muted);font-size:.78rem;white-space:nowrap">
          +${parseInt(diff).toLocaleString()} 億
        </td>
      </tr>`;
  }).join('');

  card.style.display = 'block';
}

// ── Boot ──────────────────────────────────────────────────────────────────────
initTable();
loadDates();  // loadAlerts is called inside loadDates after date is known
</script>
</body>
