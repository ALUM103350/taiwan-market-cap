<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>台灣上市公司市值追蹤</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
:root{
  --bg:#0b1746;--surface:#0f1e5a;--surface2:#162266;--surface3:#1d2a78;
  --text:#f5f5f5;--muted:#8899cc;
  --green:#00c805;--red:#ff5000;--accent:#00c805;--yellow:#f5a623;
  /* Override Bootstrap white variables */
  --bs-body-bg:#0b1746;--bs-body-color:#f5f5f5;
  --bs-table-bg:#0f1e5a;--bs-table-color:#f5f5f5;
  --bs-modal-bg:#0f1e5a;
  --bs-card-bg:#0f1e5a;
}
*{box-sizing:border-box}
/* Nuclear override — kill all white backgrounds from Bootstrap/DataTables */
html,body,
.modal-content,.modal-body,.modal-header,.modal-footer,
.dropdown-menu,.popover,.tooltip-inner,
.form-control,.form-select,
.card,.card-body,
[class*="bg-white"]{background-color:#0b1746!important}
body{background:#0b1746;color:var(--text);font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif;min-height:100vh}
.navbar{background:var(--surface)!important;border-bottom:1px solid #162266}
.navbar-brand{font-weight:700;font-size:1.1rem;color:var(--accent)!important;letter-spacing:-.02em}
.card{background:var(--surface);border:1px solid #162266;border-radius:16px}
.card-sm{padding:1.1rem 1.4rem}
.stat-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.stat-value{font-size:1.6rem;font-weight:700;line-height:1.2;margin-top:.25rem;color:var(--text)}
.up{color:var(--green)}.down{color:var(--red)}.flat{color:var(--muted)}
.badge-up{background:rgba(0,200,5,.12);color:var(--green);border-radius:6px;padding:2px 9px;font-size:.8rem;font-weight:600}
.badge-down{background:rgba(255,80,0,.12);color:var(--red);border-radius:6px;padding:2px 9px;font-size:.8rem;font-weight:600}
.badge-flat{background:rgba(136,136,136,.1);color:var(--muted);border-radius:6px;padding:2px 9px;font-size:.8rem}
table.dataTable thead th,
table.dataTable thead th.sorting,
table.dataTable thead th.sorting_asc,
table.dataTable thead th.sorting_desc{background:#1e1e1e!important;color:#888!important;font-size:.73rem;text-transform:uppercase;letter-spacing:.05em;border:none!important}
table.dataTable tbody tr,
table.dataTable tbody tr.odd,
table.dataTable tbody tr.even{background:#0f1e5a!important;border-bottom:1px solid #162266!important}
table.dataTable tbody tr:hover,
table.dataTable tbody tr.odd:hover,
table.dataTable tbody tr.even:hover{background:#162266!important}
table.dataTable tbody td,
table.dataTable tbody tr td{color:#f5f5f5!important;font-size:.87rem;border:none!important;padding:.7rem .85rem!important}
.dataTables_wrapper{background:#0f1e5a;color:#f5f5f5}
div.dataTables_wrapper div.dataTables_length label,
div.dataTables_wrapper div.dataTables_filter label,
div.dataTables_wrapper div.dataTables_info{color:#888!important}
.dataTables_wrapper .dataTables_filter input{background:var(--surface2);color:var(--text);border:1px solid #1d2a78;border-radius:8px;padding:.3rem .7rem}
.dataTables_wrapper .dataTables_length select{background:var(--surface2);color:var(--text);border:1px solid #1d2a78;border-radius:6px}
.dataTables_wrapper .dataTables_info,.dataTables_wrapper .dataTables_paginate{color:var(--muted);font-size:.82rem}
.page-link{background:var(--surface2)!important;border-color:#333!important;color:var(--text)!important}
.page-item.active .page-link{background:var(--accent)!important;border-color:var(--accent)!important;color:#000!important;font-weight:700}
.btn-refresh{background:var(--accent);border:none;color:#000;border-radius:8px;padding:.4rem 1rem;font-size:.85rem;cursor:pointer;font-weight:700}
.btn-refresh:hover{background:#00e006}
.btn-refresh:disabled{opacity:.5;cursor:wait}
.date-select{background:var(--surface2);color:var(--text);border:1px solid #1d2a78;border-radius:8px;padding:.35rem .7rem;font-size:.85rem}
.rank-badge{display:inline-block;width:2.2rem;text-align:center;background:var(--surface3);border-radius:5px;font-size:.78rem;color:var(--muted);font-weight:600}
.rank-badge.top3{background:rgba(0,200,5,.15);color:var(--green)}
.stock-link{color:var(--text);text-decoration:none;font-weight:600}
.stock-link:hover{color:var(--accent)}
.chart-box{background:var(--surface);border:1px solid #162266;border-radius:16px;padding:1.1rem}
.section-title{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem}
.loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(6px)}
.spinner{width:3rem;height:3rem;border:3px solid #222;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-content{background:var(--surface);border:1px solid #162266;color:var(--text)}
.modal-header{border-bottom:1px solid #162266}
.modal-footer{border-top:1px solid #222}
#stockChart canvas{max-height:220px}
.alert-info-dark{background:rgba(0,200,5,.08);border:1px solid rgba(0,200,5,.2);color:var(--green);border-radius:8px;padding:.6rem 1rem;font-size:.83rem}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid px-4">
    <span class="navbar-brand">
      <i class="fa-solid fa-chart-line me-2" style="color:var(--blue)"></i>
      台灣上市公司市值追蹤
    </span>
    <div class="d-flex align-items-center gap-3 ms-auto">
      <select id="dateSelect" class="date-select" title="選擇日期"></select>
      <button id="refreshBtn" class="btn-refresh" onclick="refreshData()">
        <i class="fa-solid fa-rotate-right me-1"></i>更新資料
      </button>
    </div>
  </div>
</nav>

<!-- Loading overlay -->
<div id="loadingOverlay" class="loading-overlay">
  <div class="text-center">
    <div class="spinner mx-auto mb-3"></div>
    <div style="color:var(--muted);font-size:.9rem" id="loadingMsg">載入中…</div>
  </div>
</div>

<!-- Alert banner (today only) -->
<div id="alertBanner" style="display:none;background:linear-gradient(90deg,#0b1746,#162266);border-bottom:2px solid var(--accent);padding:.55rem 1.5rem">
  <div id="alertContent" class="d-flex flex-wrap gap-2 align-items-center"></div>
</div>

<!-- Main -->
<div class="container-fluid px-4 py-4">

  <!-- Summary cards -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="card card-sm">
        <div class="stat-label">總市值</div>
        <div class="stat-value" id="totalCap">—</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card card-sm">
        <div class="stat-label">上漲家數</div>
        <div class="stat-value up" id="upCount">—</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card card-sm">
        <div class="stat-label">下跌家數</div>
        <div class="stat-value down" id="downCount">—</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card card-sm">
        <div class="stat-label">上市家數</div>
        <div class="stat-value" id="totalCount">—</div>
      </div>
    </div>
  </div>

  <!-- Charts -->
  <div class="row g-3 mb-4">
    <div class="col-md-6">
      <div class="chart-box">
        <div class="section-title"><i class="fa-solid fa-arrow-trend-up me-1" style="color:var(--green)"></i>市值增加前10名</div>
        <canvas id="gainersChart"></canvas>
      </div>
    </div>
    <div class="col-md-6">
      <div class="chart-box">
        <div class="section-title"><i class="fa-solid fa-arrow-trend-down me-1" style="color:var(--red)"></i>市值減少前10名</div>
        <canvas id="losersChart"></canvas>
      </div>
    </div>
  </div>

  <!-- Trillion crossover history -->
  <div id="alertHistoryCard" class="card p-3 mb-4" style="display:none">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <div class="section-title mb-0">
        <i class="fa-solid fa-bell me-1" style="color:var(--accent)"></i>兆級排名交叉紀錄
      </div>
      <span id="alertHistoryCount" style="font-size:.78rem;color:var(--muted)"></span>
    </div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:.84rem">
        <thead>
          <tr style="color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.05em">
            <th style="padding:.5rem .75rem;white-space:nowrap">日期</th>
            <th style="padding:.5rem .75rem">級距</th>
            <th style="padding:.5rem .75rem">超越方</th>
            <th style="padding:.5rem .75rem;text-align:center;color:var(--muted)"></th>
            <th style="padding:.5rem .75rem">被超越方</th>
            <th style="padding:.5rem .75rem;text-align:right;white-space:nowrap">市值差距</th>
          </tr>
        </thead>
        <tbody id="alertHistoryBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Comparison chart -->
  <div class="card p-3 mb-4">
    <div class="section-title"><i class="fa-solid fa-chart-line me-1" style="color:var(--accent)"></i>個股市值比較</div>
    <div class="d-flex flex-wrap gap-2 mb-3 align-items-center">
      <input id="compareInput" type="text" placeholder="輸入股票代號（如 2330）" autocomplete="off"
        class="date-select" style="width:200px"
        onkeydown="if(event.key==='Enter')addCompare()">
      <button class="btn-refresh" onclick="addCompare()" style="padding:.38rem .9rem">
        <i class="fa-solid fa-plus me-1"></i>加入
      </button>
      <select id="compareDays" class="date-select" onchange="refreshCompare()" style="width:100px">
        <option value="10">10天</option>
        <option value="30" selected>30天</option>
        <option value="60">60天</option>
      </select>
      <div id="compareTags" class="d-flex flex-wrap gap-1"></div>
    </div>
    <div style="position:relative;height:280px">
      <canvas id="compareChart"></canvas>
      <div id="compareEmpty" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.9rem">
        輸入股票代號加入比較
      </div>
    </div>
  </div>

  <!-- No market cap warning -->
  <div id="noCapWarning" class="alert-info-dark mb-3 d-none">
    <i class="fa-solid fa-circle-info me-2"></i>
    目前顯示的是從 TWSE 備援資料，市值欄位需要 FinMind API 才能計算。
    可設定 <code>FINMIND_TOKEN</code> 後點擊「更新資料」。
  </div>

  <!-- Data table -->
  <div class="card p-3">
    <div class="section-title mb-2"><i class="fa-solid fa-table me-1"></i>完整排行榜</div>
    <table id="mainTable" class="table table-sm" style="width:100%">
      <thead>
        <tr>
          <th>排名</th>
          <th>代號</th>
          <th>公司名稱</th>
          <th>收盤價</th>
          <th>市值 (億)</th>
          <th>市值變化 (億)</th>
          <th>漲跌幅</th>
          <th>股價漲跌</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- Stock history modal -->
<div class="modal fade" id="stockModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="stockModalTitle">市值走勢</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="stockChart"><canvas id="historyCanvas"></canvas></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">關閉</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
// ── Helpers ──────────────────────────────────────────────────────────────────
const UNITS = 1e8;  // 億

function fmtCap(v) {
  if (!v || v === 0) return '—';
  const yi = v / UNITS;
  if (yi >= 10000) return (yi / 10000).toFixed(2) + ' 兆';
  if (yi >= 1) return yi.toFixed(2) + ' 億';
  return (v / 1e4).toFixed(0) + ' 萬';
}

function fmtCapChange(v) {
  if (v === 0 || v === null || v === undefined) return '<span class="flat">—</span>';
  const yi = v / UNITS;
  const sign = v > 0 ? '+' : '';
  const cls = v > 0 ? 'up' : 'down';
  return `<span class="${cls}">${sign}${yi.toFixed(2)} 億</span>`;
}

function fmtPct(v) {
  v = parseFloat(v);
  if (!v || isNaN(v)) return '<span class="badge-flat">0.00%</span>';
  const sign = v > 0 ? '+' : '';
  const cls = v > 0 ? 'badge-up' : 'badge-down';
  return `<span class="${cls}">${sign}${v.toFixed(2)}%</span>`;
}

function fmtPrice(v) {
  if (!v) return '—';
  return v.toLocaleString('zh-TW', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function fmtPriceChange(v) {
  if (!v) return '<span class="flat">—</span>';
  const sign = v > 0 ? '+' : '';
  const cls = v > 0 ? 'up' : v < 0 ? 'down' : 'flat';
  return `<span class="${cls}">${sign}${v.toFixed(2)}</span>`;
}

function rankBadge(r) {
  const top = r <= 3 ? ' top3' : '';
  return `<span class="rank-badge${top}">${r || '—'}</span>`;
}

// ── State ─────────────────────────────────────────────────────────────────────
let table = null;
let gainChart = null, loseChart = null, histChart = null;
let currentData = [];

// ── Chart defaults ─────────────────────────────────────────────────────────
Chart.defaults.color = '#888';
Chart.defaults.borderColor = '#162266';
Chart.defaults.font.family = "-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif";

// ── Init DataTable ──────────────────────────────────────────────────────────
function initTable() {
  table = $('#mainTable').DataTable({
    data: [],
    columns: [
      { data: 'market_cap_rank' },
      { data: 'stock_id' },
      { data: 'stock_name' },
      { data: 'close_price' },
      { data: 'market_cap' },
      { data: 'cap_change' },
      { data: 'cap_change_pct' },
      { data: 'price_change' },
    ],
    columnDefs: [
      { targets: 0, render: d => rankBadge(d), className: 'text-center' },
      { targets: 1, render: (d, _, row) =>
        `<a href="#" class="stock-link" onclick="showHistory('${d}','${row.stock_name}');return false">${d}</a>` },
      { targets: 3, render: d => fmtPrice(d) },
      { targets: 4, render: d => fmtCap(d) },
      { targets: 5, render: d => fmtCapChange(d) },
      { targets: 6, render: d => fmtPct(d) },
      { targets: 7, render: d => fmtPriceChange(d) },
    ],
    order: [[4, 'desc']],
    pageLength: 50,
    lengthMenu: [25, 50, 100, 200],
    language: {
      search: '搜尋：', lengthMenu: '顯示 _MENU_ 筆',
      info: '第 _START_–_END_ 筆，共 _TOTAL_ 筆',
      paginate: { previous: '‹', next: '›' },
      zeroRecords: '無資料', infoEmpty: '無資料',
    },
    dom: "<'row mb-2'<'col-sm-6'l><'col-sm-6'f>>rt<'row mt-2'<'col-sm-5'i><'col-sm-7'p>>",
  });
}

// ── Load dates ───────────────────────────────────────────────────────────────
async function loadDates() {
  const res = await fetch('/api/dates');
  const dates = await res.json();
  const sel = document.getElementById('dateSelect');
  sel.innerHTML = dates.map(d => `<option value="${d}">${d}</option>`).join('');
  if (dates.length) loadData(dates[0]);
  else {
    document.getElementById('loadingOverlay').style.display = 'none';
    document.getElementById('noCapWarning').classList.remove('d-none');
  }
}

// ── Load market cap data ──────────────────────────────────────────────────────
async function loadData(dateStr) {
  showLoading(`載入 ${dateStr} 資料…`);
  try {
    const res = await fetch(`/api/market-cap?date=${dateStr}`);
    const json = await res.json();
    if (json.error) { alert(json.error); hideLoading(); return; }

    currentData = json.data;

    // Summary
    const s = json.summary;
    document.getElementById('totalCap').textContent = fmtCap(s.total_market_cap);
    document.getElementById('upCount').textContent = s.up_count ?? '—';
    document.getElementById('downCount').textContent = s.down_count ?? '—';
    document.getElementById('totalCount').textContent = s.total ?? '—';

    // Check if market cap data exists
    const hasMarketCap = currentData.some(r => r.market_cap > 0);
    document.getElementById('noCapWarning').classList.toggle('d-none', hasMarketCap);

    // Table
    if (table) {
      table.clear().rows.add(currentData).draw();
    }

    // Charts
    renderTopCharts(currentData);
  } catch (e) {
    console.error(e);
  } finally {
    hideLoading();
  }
}

// ── Bar charts ────────────────────────────────────────────────────────────────
function renderTopCharts(data) {
  const sorted = [...data].filter(r => r.market_cap > 0 && r.cap_change !== undefined);

  const gainers = [...sorted].sort((a,b) => b.cap_change_pct - a.cap_change_pct).slice(0, 10);
  const losers  = [...sorted].sort((a,b) => a.cap_change_pct - b.cap_change_pct).slice(0, 10);

  renderBar('gainersChart', gainers, '#00c805', gainChart, c => gainChart = c);
  renderBar('losersChart',  losers,  '#ff5000', loseChart, c => loseChart = c);
}

function renderBar(canvasId, data, color, existing, setter) {
  if (existing) existing.destroy();
  const ctx = document.getElementById(canvasId).getContext('2d');
  setter(new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(r => `${r.stock_id} ${r.stock_name}`),
      datasets: [{
        data: data.map(r => parseFloat(r.cap_change_pct) || 0),
        backgroundColor: color + '99',
        borderColor: color,
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: { legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.x.toFixed(2)}%` } }
      },
      scales: {
        x: { grid: { color: '#334155' }, ticks: { callback: v => v+'%' } },
        y: { grid: { display: false }, ticks: { font: { size: 11 } } },
      }
    }
  }));
}

// ── Stock history modal ───────────────────────────────────────────────────────
async function showHistory(stockId, stockName) {
  document.getElementById('stockModalTitle').textContent = `${stockId} ${stockName} — 市值走勢`;
  const modal = new bootstrap.Modal(document.getElementById('stockModal'));
  modal.show();

  const res = await fetch(`/api/stock/${stockId}/history`);
  const history = await res.json();

  if (histChart) histChart.destroy();
  const ctx = document.getElementById('historyCanvas').getContext('2d');
  histChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: history.map(r => r.date),
      datasets: [
        {
          label: '市值 (億)',
          data: history.map(r => r.market_cap > 0 ? (r.market_cap/1e8).toFixed(2) : null),
          borderColor: '#00c805',
          backgroundColor: 'rgba(0,200,5,.08)',
          fill: true,
          tension: .3,
          pointRadius: 3,
          yAxisID: 'y',
        },
        {
          label: '收盤價',
          data: history.map(r => r.close_price),
          borderColor: '#f59e0b',
          tension: .3,
          pointRadius: 3,
          yAxisID: 'y2',
        }
      ]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { display: true } },
      scales: {
        y:  { position: 'left',  grid: { color:'#334155' }, title: { display: true, text: '市值 (億)' } },
        y2: { position: 'right', grid: { display: false }, title: { display: true, text: '收盤價 (元)' } },
        x:  { grid: { color:'#334155' } },
      }
    }
  });
}

// ── Refresh data ──────────────────────────────────────────────────────────────
async function refreshData() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  const dateStr = document.getElementById('dateSelect').value;
  showLoading(`重新抓取 ${dateStr} 資料…`);

  try {
    await fetch('/api/refresh', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date: dateStr })
    });
    // Wait a bit for background task then reload
    setTimeout(() => {
      loadDates().then(() => {
        document.getElementById('dateSelect').value = dateStr;
        loadData(dateStr);
      });
    }, 5000);
  } catch(e) {
    hideLoading();
    btn.disabled = false;
  }
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function showLoading(msg) {
  document.getElementById('loadingMsg').textContent = msg || '載入中…';
  document.getElementById('loadingOverlay').style.display = 'flex';
}
function hideLoading() {
  document.getElementById('loadingOverlay').style.display = 'none';
  document.getElementById('refreshBtn').disabled = false;
}

// ── Date selector ─────────────────────────────────────────────────────────────
document.getElementById('dateSelect').addEventListener('change', function() {
  loadData(this.value);
});

// ── Comparison chart ──────────────────────────────────────────────────────────
const COMPARE_COLORS = ['#00c805','#ff5000','#3b82f6','#f59e0b','#a855f7','#ec4899','#14b8a6','#f97316'];
let compareStocks = [];  // [{id, name}]
let compareChart = null;

async function addCompare() {
  const input = document.getElementById('compareInput');
  const sid = input.value.trim();
  if (!sid) return;
  if (compareStocks.find(s => s.id === sid)) { input.value=''; return; }
  if (compareStocks.length >= 8) { alert('最多比較 8 支股票'); return; }

  // Fetch to verify stock exists
  const days = document.getElementById('compareDays').value;
  const res = await fetch(`/api/stock/${sid}/history?days=${days}`);
  const hist = await res.json();
  if (!hist.length) { alert(`找不到股票代號 ${sid}`); return; }

  const name = hist[0].stock_name || sid;
  compareStocks.push({ id: sid, name });
  input.value = '';
  renderCompareTags();
  await refreshCompare();
}

function removeCompare(sid) {
  compareStocks = compareStocks.filter(s => s.id !== sid);
  renderCompareTags();
  refreshCompare();
}

function renderCompareTags() {
  const el = document.getElementById('compareTags');
  el.innerHTML = compareStocks.map((s, i) =>
    `<span style="background:${COMPARE_COLORS[i]}22;color:${COMPARE_COLORS[i]};border:1px solid ${COMPARE_COLORS[i]}44;
      border-radius:20px;padding:2px 10px;font-size:.8rem;cursor:pointer;white-space:nowrap"
      onclick="removeCompare('${s.id}')">
      ${s.id} ${s.name} ✕
    </span>`
  ).join('');
}

async function refreshCompare() {
  const days = document.getElementById('compareDays').value;
  const empty = document.getElementById('compareEmpty');

  if (!compareStocks.length) {
    if (compareChart) { compareChart.destroy(); compareChart = null; }
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  // Fetch history for all stocks in parallel
  const allData = await Promise.all(
    compareStocks.map(s =>
      fetch(`/api/stock/${s.id}/history?days=${days}`)
        .then(r => r.json())
        .then(h => ({ ...s, history: h }))
    )
  );

  // Union of all dates
  const dateSet = new Set();
  allData.forEach(s => s.history.forEach(r => dateSet.add(r.date)));
  const labels = [...dateSet].sort();

  const datasets = allData.map((s, i) => {
    const byDate = Object.fromEntries(s.history.map(r => [r.date, r.market_cap]));
    return {
      label: `${s.id} ${s.name}`,
      data: labels.map(d => byDate[d] ? (byDate[d] / 1e8).toFixed(1) : null),
      borderColor: COMPARE_COLORS[i],
      backgroundColor: COMPARE_COLORS[i] + '18',
      fill: false,
      tension: .3,
      pointRadius: 3,
      spanGaps: true,
    };
  });

  if (compareChart) compareChart.destroy();
  const ctx = document.getElementById('compareChart').getContext('2d');
  compareChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#f5f5f5', boxWidth: 12, font: { size: 12 } } },
        tooltip: { callbacks: { label: c => ` ${c.dataset.label}: ${c.parsed.y} 億` } }
      },
      scales: {
        x: { grid: { color: '#162266' }, ticks: { maxTicksLimit: 10 } },
        y: { grid: { color: '#162266' }, ticks: { callback: v => v + ' 億' } }
      }
    }
  });
}

// ── Trillion alerts ───────────────────────────────────────────────────────────
async function loadAlerts() {
  try {
    const res = await fetch('/api/alerts');
    const alerts = await res.json();
    if (!alerts.length) return;

    const latestDate = alerts[0].date;
    const todayAlerts = alerts.filter(a => a.date === latestDate);

    // ── Top banner: today's crossovers ──
    const banner  = document.getElementById('alertBanner');
    const content = document.getElementById('alertContent');
    if (todayAlerts.length) {
      content.innerHTML =
        `<span style="color:var(--accent);font-size:.78rem;font-weight:700;letter-spacing:.05em;white-space:nowrap">
           <i class="fa-solid fa-bell me-1"></i>今日異動
         </span>` +
        todayAlerts.map(a => {
          const wCap = (a.winner_cap / 1e8).toFixed(0);
          const lCap = (a.loser_cap  / 1e8).toFixed(0);
          const tierColor = a.tier === '兆' ? '#a78bfa' : '#38bdf8';
          return `
            <span style="background:rgba(0,200,5,.08);border:1px solid rgba(0,200,5,.25);
              border-radius:8px;padding:3px 11px;font-size:.8rem;white-space:nowrap">
              <span style="background:${tierColor}22;color:${tierColor};border-radius:4px;padding:1px 6px;font-size:.7rem;margin-right:5px">${a.tier}</span>
              <span style="color:var(--muted);font-size:.72rem;margin-right:5px">${a.date}</span>
              <span style="color:var(--green);font-weight:700">${a.winner_id} ${a.winner_name}</span>
              <span style="color:var(--muted);margin:0 5px">超越</span>
              <span style="color:var(--red)">${a.loser_id} ${a.loser_name}</span>
              <span style="color:var(--muted);font-size:.72rem;margin-left:6px">${parseInt(wCap).toLocaleString()} vs ${parseInt(lCap).toLocaleString()} 億</span>
            </span>`;
        }).join('');
      banner.style.display = 'block';
    }

    // ── History table: all crossovers ──
    const card = document.getElementById('alertHistoryCard');
    const body = document.getElementById('alertHistoryBody');
    const count = document.getElementById('alertHistoryCount');
    count.textContent = `共 ${alerts.length} 筆`;

    body.innerHTML = alerts.map((a, idx) => {
      const wCap      = (a.winner_cap / 1e8).toFixed(0);
      const lCap      = (a.loser_cap  / 1e8).toFixed(0);
      const diff      = ((a.winner_cap - a.loser_cap) / 1e8).toFixed(0);
      const isNew     = a.date === latestDate;
      const bg        = idx % 2 === 0 ? 'background:#0f1e5a' : 'background:#0b1746';
      const tierColor = a.tier === '兆' ? '#a78bfa' : '#38bdf8';
      return `
        <tr style="${bg};border-bottom:1px solid #162266">
          <td style="padding:.55rem .75rem;white-space:nowrap;color:var(--muted);font-size:.78rem">
            ${isNew ? '<span style="background:rgba(0,200,5,.15);color:var(--green);border-radius:4px;padding:1px 6px;font-size:.7rem;margin-right:4px">NEW</span>' : ''}
            ${a.date}
          </td>
          <td style="padding:.55rem .5rem;white-space:nowrap">
            <span style="background:${tierColor}22;color:${tierColor};border-radius:4px;padding:1px 6px;font-size:.7rem">${a.tier}</span>
          </td>
          <td style="padding:.55rem .75rem">
            <span style="color:var(--green);font-weight:600">${a.winner_id}</span>
            <span style="color:#8899cc;margin-left:4px;font-size:.82rem">${a.winner_name}</span>
            <span style="color:var(--muted);font-size:.75rem;margin-left:6px">${parseInt(wCap).toLocaleString()} 億</span>
          </td>
          <td style="padding:.55rem .5rem;text-align:center;color:var(--accent);font-size:.8rem">超越</td>
          <td style="padding:.55rem .75rem">
            <span style="color:var(--red)">${a.loser_id}</span>
            <span style="color:#8899cc;margin-left:4px;font-size:.82rem">${a.loser_name}</span>
            <span style="color:var(--muted);font-size:.75rem;margin-left:6px">${parseInt(lCap).toLocaleString()} 億</span>
          </td>
          <td style="padding:.55rem .75rem;text-align:right;color:var(--muted);font-size:.78rem;white-space:nowrap">
            +${parseInt(diff).toLocaleString()} 億
          </td>
        </tr>`;
    }).join('');

    card.style.display = 'block';
  } catch(e) { console.error('alerts error', e); }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
initTable();
loadDates();
loadAlerts();
</script>
</body>
</html>
